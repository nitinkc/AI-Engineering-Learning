site_name: AI Engineer Interview Playbook
site_description: Step-by-step learning, interview preparation, and retention labs for AI Engineer, Agentic AI, and LLMOps roles
site_author: Nitin Chaurasia
docs_dir: docs
repo_url: https://github.com/nitinkc/AI-Engineering-Learning

theme:
  name: material
  icon:
    previous: fontawesome/solid/angle-left
    next: fontawesome/solid/angle-right
  palette:
    - scheme: default
      primary: brown
      accent: brown
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: brown
      accent: brown
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - header.autohide
